<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternHub - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    
    <div id="sidebar-container"></div>
    <div class="flex-1 flex flex-col ml-56 min-w-0 h-screen overflow-hidden bg-[#f4f7f9]">
        <div id="navbar-container"></div>
        <main class="flex-1 overflow-y-auto p-8" id="main-content">
            
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h1 class="text-xl font-bold text-gray-800">Profile</h1>
                    <p class="text-gray-500 text-sm mt-0.5">Manage your information</p>
                </div>
                <button onclick="saveProfile()" class="bg-[#2563eb] hover:bg-blue-700 text-white px-5 py-2 rounded-md text-sm font-semibold flex items-center gap-2 shadow-sm transition">
                    <i class="far fa-save"></i> Save
                </button>
            </div>

            <div class="bg-white border border-gray-200 rounded-md shadow-sm mb-6 max-w-4xl">
                <!-- Basic Info Segment -->
                <div class="p-6 border-b border-gray-200">
                    <h3 class="font-bold text-gray-800 text-sm mb-4 border-b border-gray-100 pb-2">Basic Info</h3>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">NAME</label>
                            <input type="text" id="prof-name" class="w-full px-3 py-2 border border-gray-200 bg-gray-50 rounded-md text-sm text-gray-800 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">EMAIL</label>
                            <input type="email" id="prof-email" disabled class="w-full px-3 py-2 border border-gray-200 bg-gray-100 rounded-md text-sm text-gray-500 cursor-not-allowed">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">PHONE</label>
                            <input type="text" id="prof-phone" class="w-full px-3 py-2 border border-gray-200 bg-gray-50 rounded-md text-sm text-gray-800 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">LOCATION</label>
                            <input type="text" id="prof-location" class="w-full px-3 py-2 border border-gray-200 bg-gray-50 rounded-md text-sm text-gray-800 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                        </div>
                    </div>
                </div>

                <!-- Personal Info Segment -->
                <div class="p-6 border-b border-gray-200">
                    <h3 class="font-bold text-gray-800 text-sm mb-4 border-b border-gray-100 pb-2">Personal Info</h3>
                    <div class="mb-5">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">BIO</label>
                        <textarea id="prof-bio" rows="3" class="w-full px-3 py-2 border border-gray-200 bg-gray-50 rounded-md text-sm text-gray-800 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">CAREER OBJECTIVE</label>
                        <textarea id="prof-objective" rows="2" class="w-full px-3 py-2 border border-gray-200 bg-gray-50 rounded-md text-sm text-gray-800 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"></textarea>
                    </div>
                </div>

                <!-- Skills Segment -->
                <div class="p-6">
                    <h3 class="font-bold text-gray-800 text-sm mb-4 border-b border-gray-100 pb-2">Technical Skills</h3>
                    <div class="mb-3">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">ADD SKILLS (Comma separated)</label>
                        <input type="text" id="prof-skills-input" placeholder="e.g. React, Python, UI Design" class="w-full px-3 py-2 border border-gray-200 bg-gray-50 rounded-md text-sm text-gray-800 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                    </div>
                    <div class="flex flex-wrap gap-2 mt-3" id="prof-skills-display">
                        <!-- Skill tags -->
                    </div>
                </div>
            </div>

            <div id="save-msg" class="fixed bottom-6 right-6 bg-gray-800 text-white px-6 py-3 rounded-md shadow-lg transform transition-transform translate-y-20 opacity-0 flex items-center gap-3 font-medium text-sm">
                <i class="fas fa-check-circle text-green-400 text-lg"></i> Profile Updated Successfully
            </div>

        </main>
    </div>

    <script src="../../js/mockData.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/components.js"></script>
    <script>
        let currentUser;
        
        document.addEventListener('DOMContentLoaded', () => {
            currentUser = requireAuth('user');
            if(!currentUser) return;

            initLayout('user', 'profile', '');

            // Populate forms
            document.getElementById('prof-name').value = currentUser.name || '';
            document.getElementById('prof-email').value = currentUser.email || '';
            document.getElementById('prof-phone').value = currentUser.phone || '';
            document.getElementById('prof-location').value = currentUser.location || '';
            document.getElementById('prof-bio').value = currentUser.bio || '';
            document.getElementById('prof-objective').value = currentUser.careerObjective || '';
            
            if(currentUser.skills) {
                document.getElementById('prof-skills-input').value = currentUser.skills.join(', ');
                renderSkills(currentUser.skills);
            }

            document.getElementById('prof-skills-input').addEventListener('input', (e) => {
                const arr = e.target.value.split(',').map(s => s.trim()).filter(s => s);
                renderSkills(arr);
            });
        });

        function renderSkills(skillsArr) {
            const display = document.getElementById('prof-skills-display');
            if(skillsArr.length === 0) {
                display.innerHTML = '<span class="text-xs text-gray-400 italic">No skills added yet</span>';
                return;
            }
            display.innerHTML = skillsArr.map(s => `
                <span class="bg-[#10b981] text-white px-2.5 py-1 rounded text-[11px] font-bold shadow-sm">${s}</span>
            `).join('');
        }

        function saveProfile() {
            currentUser.name = document.getElementById('prof-name').value;
            currentUser.phone = document.getElementById('prof-phone').value;
            currentUser.location = document.getElementById('prof-location').value;
            currentUser.bio = document.getElementById('prof-bio').value;
            currentUser.careerObjective = document.getElementById('prof-objective').value;
            currentUser.skills = document.getElementById('prof-skills-input').value.split(',').map(s => s.trim()).filter(s => s);
            
            let filledFields = 0;
            const totalFields = 6;
            if(currentUser.name) filledFields++;
            if(currentUser.phone) filledFields++;
            if(currentUser.location) filledFields++;
            if(currentUser.bio) filledFields++;
            if(currentUser.careerObjective) filledFields++;
            if(currentUser.skills.length > 0) filledFields++;
            currentUser.completion = Math.round((filledFields / totalFields) * 100);

            setCurrentUser(currentUser);
            
            const users = getDB('internhub_users');
            const idx = users.findIndex(u => u.id === currentUser.id);
            if(idx > -1) {
                users[idx] = currentUser;
                setDB('internhub_users', users);
            }

            // Show toast
            const toast = document.getElementById('save-msg');
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
            
            // Re-render navbar to update name instantly
            initLayout('user', 'profile', '');
        }
    </script>
</body>
</html>
