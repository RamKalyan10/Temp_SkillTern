<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternHub - Manage Companies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    
    <div id="sidebar-container"></div>
    <div class="flex-1 flex flex-col ml-56 min-w-0 h-screen overflow-hidden bg-[#f4f7f9]">
        <div id="navbar-container"></div>
        <main class="flex-1 overflow-y-auto p-8" id="main-content">
            
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h1 class="text-xl font-bold text-gray-800 tracking-tight">Manage Companies</h1>
                    <p class="text-gray-500 text-sm mt-1">Verify new registrations and manage active profiles</p>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex gap-4 mb-6 border-b border-gray-200">
                <button onclick="switchTab('pending')" id="tab-pending" class="px-4 py-2 text-sm font-bold border-b-2 border-blue-600 text-blue-600 transition-colors">
                    Pending Verification <span class="bg-red-100 text-red-600 px-1.5 py-0.5 rounded-full text-[10px] ml-1" id="badge-pending">0</span>
                </button>
                <button onclick="switchTab('active')" id="tab-active" class="px-4 py-2 text-sm font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors">
                    Active Companies
                </button>
            </div>

            <div class="bg-white border border-gray-200 rounded-md shadow-sm overflow-hidden" id="table-container">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="py-3 px-6 text-[11px] font-bold text-gray-500 uppercase tracking-widest">COMPANY</th>
                            <th class="py-3 px-6 text-[11px] font-bold text-gray-500 uppercase tracking-widest">INDUSTRY / SIZE</th>
                            <th class="py-3 px-6 text-[11px] font-bold text-gray-500 uppercase tracking-widest">STATUS</th>
                            <th class="py-3 px-6 text-[11px] font-bold text-gray-500 uppercase tracking-widest text-right">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
                <div id="no-data" class="hidden text-center py-10 text-gray-500 text-sm">
                    No companies found.
                </div>
            </div>

        </main>
    </div>

    <script src="../../js/mockData.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/components.js"></script>
    <script>
        let currentTab = 'pending';
        let allCompanies = [];

        document.addEventListener('DOMContentLoaded', () => {
            const admin = requireAuth('admin');
            if(!admin) return;

            initLayout('admin', 'companies', 'Manage Organizations');
            fetchAndRender();
        });

        function switchTab(tab) {
            currentTab = tab;
            
            document.getElementById('tab-pending').className = 'px-4 py-2 text-sm font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors';
            document.getElementById('tab-active').className = 'px-4 py-2 text-sm font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors';
            
            document.getElementById(`tab-${tab}`).className = 'px-4 py-2 text-sm font-bold border-b-2 border-blue-600 text-blue-600 transition-colors';
            
            fetchAndRender();
        }

        function fetchAndRender() {
            allCompanies = getDB('internhub_companies');
            const pendingCount = allCompanies.filter(c => c.status === 'Pending').length;
            document.getElementById('badge-pending').innerText = pendingCount;

            let filtered = [];
            if(currentTab === 'pending') {
                filtered = allCompanies.filter(c => c.status === 'Pending');
            } else {
                filtered = allCompanies.filter(c => c.status === 'Verified');
            }

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            if(filtered.length === 0) {
                document.getElementById('no-data').classList.remove('hidden');
                return;
            } else {
                document.getElementById('no-data').classList.add('hidden');
            }

            filtered.forEach(c => {
                let statusBadge = '';
                let actionsHtml = '';

                if(c.status === 'Pending') {
                    statusBadge = `<span class="bg-orange-50 text-orange-600 border border-orange-200 shadow-sm px-2.5 py-1 rounded-sm text-[11px] font-semibold uppercase tracking-wider">Pending</span>`;
                    actionsHtml = `
                        <button onclick="updateStatus('${c.id}', 'Verified')" class="text-green-600 hover:bg-green-50 border border-green-200 px-3 py-1.5 rounded transition shadow-sm font-bold text-xs" title="Verify Company"><i class="fas fa-check mr-1"></i> Verify</button>
                        <button onclick="deleteCompany('${c.id}')" class="text-red-500 hover:text-red-700 hover:bg-red-50 border border-red-200 px-2 py-1.5 rounded transition shadow-sm ml-1" title="Reject & Delete"><i class="fas fa-times text-xs"></i></button>
                    `;
                } else {
                    statusBadge = `<span class="bg-green-50 text-green-700 border border-green-200 shadow-sm px-2.5 py-1 rounded-sm text-[11px] font-semibold uppercase tracking-wider">Verified</span>`;
                    actionsHtml = `
                        <button onclick="deleteCompany('${c.id}')" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 border border-red-200 px-2.5 py-1.5 rounded transition shadow-sm" title="Delete Account"><i class="fas fa-trash text-xs"></i></button>
                    `;
                }

                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-100 hover:bg-gray-50 transition-colors bg-white';
                tr.innerHTML = `
                    <td class="py-4 px-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded border border-gray-200 bg-gray-50 flex items-center justify-center font-bold text-gray-500 text-sm shadow-sm">
                                ${c.name.charAt(0)}
                            </div>
                            <div>
                                <span class="font-bold text-gray-800 text-sm block mb-0.5">${c.name}</span>
                                <a href="${c.website ? (c.website.startsWith('http') ? c.website : 'https://'+c.website) : '#'}" target="_blank" class="text-blue-500 text-xs hover:underline">${c.website || 'No website'}</a>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-6">
                        <p class="text-sm text-gray-800 font-medium">${c.industry || '-'}</p>
                        <p class="text-xs text-gray-500 mt-1"><i class="fas fa-users text-gray-400 mr-1"></i> ${c.size || '-'}</p>
                    </td>
                    <td class="py-4 px-6">${statusBadge}</td>
                    <td class="py-4 px-6 text-right w-40">
                        ${actionsHtml}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateStatus(id, newStatus) {
            let db = getDB('internhub_companies');
            const target = db.find(c => c.id === id);
            if(target) {
                target.status = newStatus;
                setDB('internhub_companies', db);
                fetchAndRender();
            }
        }

        function deleteCompany(id) {
            if(confirm('Are you sure you want to permanently delete this company and all its listings?')) {
                let db = getDB('internhub_companies');
                db = db.filter(c => c.id !== id);
                setDB('internhub_companies', db);

                // Cascade delete listings
                let internships = getDB('internhub_internships');
                internships = internships.filter(i => i.companyId !== id);
                setDB('internhub_internships', internships);

                // Cascade delete apps
                let apps = getDB('internhub_applications');
                apps = apps.filter(a => a.companyId !== id);
                setDB('internhub_applications', apps);

                fetchAndRender();
            }
        }
    </script>
</body>
</html>
