<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternHub - Manage Listings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    
    <div id="sidebar-container"></div>
    <div class="flex-1 flex flex-col ml-56 min-w-0 h-screen overflow-hidden bg-[#f4f7f9]">
        <div id="navbar-container"></div>
        <main class="flex-1 overflow-y-auto p-8" id="main-content">
            
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h1 class="text-xl font-bold text-gray-800 tracking-tight">Manage Listings</h1>
                    <p class="text-gray-500 text-sm mt-1">View, edit or delete your active postings</p>
                </div>
                <a href="post.html" class="bg-[#2563eb] hover:bg-blue-700 text-white px-5 py-2 rounded-md text-[13px] font-semibold flex items-center gap-2 shadow-sm transition">
                    <i class="fas fa-plus"></i> Post New
                </a>
            </div>

            <div class="bg-white border border-gray-200 rounded-md shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="py-3 px-6 text-[11px] font-bold text-gray-500 uppercase tracking-widest">TITLE</th>
                            <th class="py-3 px-6 text-[11px] font-bold text-gray-500 uppercase tracking-widest">TYPE</th>
                            <th class="py-3 px-6 text-[11px] font-bold text-gray-500 uppercase tracking-widest">APPLICANTS</th>
                            <th class="py-3 px-6 text-[11px] font-bold text-gray-500 uppercase tracking-widest">POSTED DATE</th>
                            <th class="py-3 px-6 text-[11px] font-bold text-gray-500 uppercase tracking-widest text-right">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
                <div id="no-data" class="hidden text-center py-10 text-gray-500 text-sm">
                    No active internship listings found.
                </div>
            </div>

        </main>
    </div>

    <script src="../../js/mockData.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/components.js"></script>
    <script>
        let currentUser;
        let allInternships = [];
        let allApps = [];

        document.addEventListener('DOMContentLoaded', () => {
            currentUser = requireAuth('company');
            if(!currentUser) return;

            initLayout('company', 'manage', currentUser.name);

            fetchAndRender();
        });

        function fetchAndRender() {
            allInternships = getDB('internhub_internships').filter(i => i.companyId === currentUser.id);
            allApps = getDB('internhub_applications');

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            if(allInternships.length === 0) {
                document.getElementById('no-data').classList.remove('hidden');
                return;
            }

            allInternships.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(intern => {
                const appCount = allApps.filter(a => a.internshipId === intern.id).length;

                const tr = document.createElement('tr');
                tr.className = 'border-b border-gray-100 hover:bg-gray-50 transition-colors bg-white';
                tr.innerHTML = `
                    <td class="py-4 px-6 text-sm font-medium text-gray-800">${intern.title}</td>
                    <td class="py-4 px-6 text-sm text-gray-500"><span class="bg-blue-50 text-blue-700 px-2.5 py-1 rounded text-xs font-semibold">${intern.workType}</span></td>
                    <td class="py-4 px-6 text-sm text-gray-800 font-bold">${appCount}</td>
                    <td class="py-4 px-6 text-sm text-gray-500">${formatDate(intern.createdAt)}</td>
                    <td class="py-4 px-6 text-right">
                        <button class="text-blue-500 hover:text-blue-700 border border-blue-200 hover:bg-blue-50 px-2 py-1 rounded transition mr-2" title="Edit text mock disabled"><i class="fas fa-edit text-sm"></i></button>
                        <button onclick="deleteListing('${intern.id}')" class="text-red-500 hover:text-red-700 border border-red-200 hover:bg-red-50 px-2 py-1 rounded transition" title="Delete Listing"><i class="fas fa-trash text-sm"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteListing(id) {
            if(confirm("Are you sure you want to delete this listing?")) {
                let db = getDB('internhub_internships');
                db = db.filter(i => i.id !== id);
                setDB('internhub_internships', db);
                
                // Mock cascading delete logic for applications
                let apps = getDB('internhub_applications');
                apps = apps.filter(a => a.internshipId !== id);
                setDB('internhub_applications', apps);

                fetchAndRender();
            }
        }
    </script>
</body>
</html>
