<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternHub - Company Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    
    <div id="sidebar-container"></div>
    <div class="flex-1 flex flex-col ml-56 min-w-0 h-screen overflow-hidden bg-[#f4f7f9]">
        <div id="navbar-container"></div>
        <main class="flex-1 overflow-y-auto p-8" id="main-content">
            
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h1 class="text-xl font-bold text-gray-800 tracking-tight">Company Profile</h1>
                    <p class="text-gray-500 text-sm mt-1">Manage your company information</p>
                </div>
                <button onclick="saveProfile()" class="bg-[#2563eb] hover:bg-blue-700 text-white px-5 py-2.5 rounded-md text-[13px] font-semibold flex items-center gap-2 shadow-sm transition">
                    <i class="far fa-save"></i> Save
                </button>
            </div>

            <div class="bg-white border border-gray-200 rounded-md shadow-sm mb-6 max-w-4xl">
                <!-- Basic Info -->
                <div class="p-6 border-b border-gray-200">
                    <h3 class="font-bold text-gray-800 text-[13px] mb-5 border-b border-gray-100 pb-2">Basic Info</h3>
                    <div class="grid grid-cols-2 gap-x-8 gap-y-6">
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">COMPANY NAME</label>
                            <input type="text" id="prof-name" class="w-full px-4 py-2 border border-gray-200 bg-gray-50 rounded-md text-[13px] text-gray-800 focus:outline-none focus:border-blue-500 transition-colors">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">EMAIL</label>
                            <input type="email" id="prof-email" disabled class="w-full px-4 py-2 border border-gray-200 bg-gray-100 rounded-md text-[13px] text-gray-500 cursor-not-allowed">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">WEBSITE</label>
                            <input type="text" id="prof-website" class="w-full px-4 py-2 border border-gray-200 bg-gray-50 rounded-md text-[13px] text-gray-800 focus:outline-none focus:border-blue-500 transition-colors">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">INDUSTRY</label>
                            <input type="text" id="prof-industry" class="w-full px-4 py-2 border border-gray-200 bg-gray-50 rounded-md text-[13px] text-gray-800 focus:outline-none focus:border-blue-500 transition-colors">
                        </div>
                    </div>
                </div>

                <!-- Company Details -->
                <div class="p-6">
                    <h3 class="font-bold text-gray-800 text-[13px] mb-5 border-b border-gray-100 pb-2">Company Details</h3>
                    <div class="mb-6">
                        <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">ABOUT</label>
                        <textarea id="prof-about" rows="3" class="w-full px-4 py-2 border border-gray-200 bg-gray-50 rounded-md text-[13px] text-gray-800 focus:outline-none focus:border-blue-500 transition-colors"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-x-8 gap-y-6">
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">FOUNDED</label>
                            <input type="text" id="prof-founded" class="w-full px-4 py-2 border border-gray-200 bg-gray-50 rounded-md text-[13px] text-gray-800 focus:outline-none focus:border-blue-500 transition-colors">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">COMPANY SIZE</label>
                            <input type="text" id="prof-size" class="w-full px-4 py-2 border border-gray-200 bg-gray-50 rounded-md text-[13px] text-gray-800 focus:outline-none focus:border-blue-500 transition-colors">
                        </div>
                    </div>
                </div>
            </div>

            <div id="save-msg" class="fixed bottom-6 right-6 bg-gray-800 text-white px-6 py-3 rounded-md shadow-lg transform transition-transform translate-y-20 opacity-0 flex items-center gap-3 font-medium text-sm z-50">
                <i class="fas fa-check-circle text-green-400 text-lg"></i> Profile Updated Successfully
            </div>

        </main>
    </div>

    <script src="../../js/mockData.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/components.js"></script>
    <script>
        let currentUser;
        
        document.addEventListener('DOMContentLoaded', () => {
            currentUser = requireAuth('company');
            if(!currentUser) return;

            initLayout('company', 'profile', currentUser.name);

            // Populate forms
            document.getElementById('prof-name').value = currentUser.name || '';
            document.getElementById('prof-email').value = currentUser.email || '';
            document.getElementById('prof-website').value = currentUser.website || '';
            document.getElementById('prof-industry').value = currentUser.industry || '';
            document.getElementById('prof-about').value = currentUser.about || '';
            document.getElementById('prof-founded').value = currentUser.founded || '';
            document.getElementById('prof-size').value = currentUser.size || '';
        });

        function saveProfile() {
            currentUser.name = document.getElementById('prof-name').value;
            currentUser.website = document.getElementById('prof-website').value;
            currentUser.industry = document.getElementById('prof-industry').value;
            currentUser.about = document.getElementById('prof-about').value;
            currentUser.founded = document.getElementById('prof-founded').value;
            currentUser.size = document.getElementById('prof-size').value;

            setCurrentUser(currentUser);
            
            const users = getDB('internhub_companies');
            const idx = users.findIndex(u => u.id === currentUser.id);
            if(idx > -1) {
                users[idx] = currentUser;
                setDB('internhub_companies', users);
            }

            // Show toast
            const toast = document.getElementById('save-msg');
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
            
            // Re-render navbar to update name instantly
            initLayout('company', 'profile', currentUser.name);
        }
    </script>
</body>
</html>
