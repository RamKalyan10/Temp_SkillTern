<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillTern - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-[#f4f7f9] flex flex-col items-center justify-center min-h-screen p-4 py-10">
    <div class="mb-6 text-center">
        <div class="flex items-center justify-center gap-3 mb-2">
            <i class="fas fa-graduation-cap text-3xl text-gray-800"></i>
            <h1 class="text-3xl font-extrabold text-[#2563eb]">SkillTern</h1>
            <i class="fas fa-graduation-cap text-3xl text-orange-400"></i>
        </div>
        <p class="text-gray-500 italic text-sm">~ start your journey today ~</p>
    </div>
    
    <div class="bg-white border border-blue-600 rounded-lg p-8 w-full max-w-[480px] shadow-sm">
        <h2 class="text-xl font-bold text-gray-900 mb-1">Create an Account</h2>
        <p class="text-gray-500 text-sm mb-6">Join SkillTern to find or post opportunities</p>
        
        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-700 mb-2">I am a:</label>
                <div class="grid grid-cols-2 gap-2">
                    <button type="button" onclick="selectRole('user')" id="role-user" class="role-btn bg-blue-600 text-white border border-blue-600 py-2 rounded-md text-sm font-medium flex items-center justify-center gap-2 transition-colors">
                        <i class="fas fa-user text-xs"></i> Student
                    </button>
                    <button type="button" onclick="selectRole('company')" id="role-company" class="role-btn bg-white text-gray-600 border border-gray-300 py-2 rounded-md text-sm font-medium flex items-center justify-center gap-2 hover:bg-gray-50 transition-colors">
                        <i class="fas fa-building text-xs text-blue-400"></i> Company
                    </button>
                    <input type="hidden" id="selectedRole" value="user">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name / Company Name:</label>
                <input type="text" id="name" placeholder="John Doe or Tech Corp" required class="w-full px-3 py-2.5 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm placeholder-gray-400 transition-colors">
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email:</label>
                <input type="email" id="email" placeholder="email@example.com" required class="w-full px-3 py-2.5 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm placeholder-gray-400 transition-colors">
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password:</label>
                <input type="password" id="password" placeholder="Min. 6 characters" required class="w-full px-3 py-2.5 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm placeholder-gray-400 transition-colors">
            </div>
            
            <button type="submit" class="w-full bg-[#2563eb] text-white font-semibold py-2.5 rounded-md hover:bg-blue-700 transition-colors shadow-sm">
                Sign Up
            </button>
            <div id="success-msg" class="text-green-600 text-sm mt-3 text-center hidden font-medium bg-green-50 py-2 rounded">Account created! Redirecting...</div>
        </form>
        
        <div class="mt-8 text-center text-sm border-t border-gray-100 pt-6">
            <span class="text-gray-500">Already have an account?</span>
            <a href="index.html" class="text-[#2563eb] font-semibold hover:underline ml-1">Login here</a>
        </div>
    </div>
    
    <script src="js/mockData.js"></script>
    <script src="js/app.js"></script>
    <script>
        function selectRole(role) {
            document.getElementById('selectedRole').value = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.className = 'role-btn bg-white text-gray-600 border border-gray-300 py-2 rounded-md text-sm font-medium flex items-center justify-center gap-2 hover:bg-gray-50 transition-colors';
                const icon = btn.querySelector('i');
                if(btn.id === 'role-user') icon.className = 'fas fa-user text-xs text-blue-400';
                if(btn.id === 'role-company') icon.className = 'fas fa-building text-xs text-blue-400';
            });
            const activeBtn = document.getElementById(`role-${role}`);
            activeBtn.className = 'role-btn bg-[#2563eb] text-white border border-[#2563eb] py-2 rounded-md text-sm font-medium flex items-center justify-center gap-2 transition-colors';
            activeBtn.querySelector('i').className = activeBtn.querySelector('i').className.replace('text-blue-400', 'text-white');
        }
        
        function handleSignup(e) {
            e.preventDefault();
            const role = document.getElementById('selectedRole').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const newUser = {
                id: generateId(),
                name: name,
                email: email,
                password: password,
                role: role,
                location: '',
                completion: 10
            };
            
            if(role === 'user') {
                newUser.skills = [];
                const users = getDB('skilltern_users');
                users.push(newUser);
                setDB('skilltern_users', users);
            } else {
                newUser.status = 'Pending';
                newUser.industry = '';
                newUser.size = '';
                const companies = getDB('skilltern_companies');
                companies.push(newUser);
                setDB('skilltern_companies', companies);
            }
            
            document.getElementById('success-msg').classList.remove('hidden');
            setTimeout(() => {
                if(role === 'company') alert('Company registered! Wait for Admin approval to login.');
                else {
                    setCurrentUser(newUser);
                    window.location.href = 'pages/user/dashboard.html';
                }
                if(role === 'company') window.location.href = 'index.html';
            }, 1500);
        }
    </script>
</body>
</html>
